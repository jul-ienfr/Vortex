[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vortex"
version = "0.1.0"
description = "Manifest-driven self-improving optimization engine"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Jul", email = "jul@vortex.dev" },
]
keywords = ["optimizer", "llm", "agent", "self-improving", "manifest"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "gitpython>=3.1",
    "litellm>=1.0",
    "structlog>=24.0",
    "requests>=2.31",
]

[project.optional-dependencies]
skillopt = ["skillopt>=0.1"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]
sandbox = ["docker>=7.0"]

[project.scripts]
vortex = "vortex.cli:main"

[project.urls]
Homepage = "https://github.com/jul-ienfr/Vortex"
Repository = "https://github.com/jul-ienfr/Vortex"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM"]
fixable = ["F401", "F841", "E401", "W291", "W292"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow",
