name: import-optimization
description: "Optimize Python imports"
project_path: /path/to/project
metrics:
  - name: import_count
    source: "grep -r '^import\\|^from' src/ --include='*.py' 2>/dev/null | wc -l"
    direction: down
    weight: 1.5
  - name: circular_imports
    source: "python3 -c \"import ast; modules={}; [modules.setdefault(n.name,[]).append(f.stem) for f in __import__('pathlib').Path('.').rglob('*.py') for n in ast.walk(ast.parse(f.read())) if isinstance(n,(ast.Import,ast.ImportFrom))]; print(sum(1 for m,fs in modules.items() if len(fs)>1))\""
    direction: down
    weight: 2.0
  - name: unused_imports
    source: "ruff check src/ --select F401 2>/dev/null | wc -l"
    direction: down
    weight: 2.5
constraints:
  - "Don't break existing functionality"
  - "Keep import order consistent"
optimizer:
  cli: claude
  max_changes_per_cycle: 3
  debate_enabled: true
  debate_method: standard
  model: claude-sonnet-4-6
