name: fastapi-optimization
description: "Optimize FastAPI application"
project_path: /path/to/fastapi/project
metrics:
  - name: endpoint_count
    source: "grep -r '@app.get\\|@app.post\\|@app.put\\|@app.delete' src/ --include='*.py' 2>/dev/null | wc -l"
    direction: up
    weight: 1.0
  - name: dependency_count
    source: "grep -r 'Depends(' src/ --include='*.py' 2>/dev/null | wc -l"
    direction: down
    weight: 1.5
  - name: response_time
    source: "curl -w '%{time_total}' -o /dev/null -s http://localhost:8000/docs 2>/dev/null || echo 0"
    direction: down
    weight: 2.0
constraints:
  - "Keep OpenAPI spec valid"
  - "Don't remove type hints"
optimizer:
  cli: claude
  max_changes_per_cycle: 2
  debate_enabled: true
  debate_method: standard
  model: claude-sonnet-4-6
